<!DOCTYPE html>
<html lang="pt-MZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto — Lumart</title>
  <meta name="description" content="Detalhes do produto, vídeo, avaliações e produtos relacionados." />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Estilos Lumart -->
  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/product.css" />

  <!-- jsPDF (necessário para o checkout via WhatsApp do carrinho) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body>

  <!-- Header dinâmico -->
  <div data-component="header"></div>

  <main class="produto-pagina">
    <div id="produto-detalhe" class="container-lm">
      <!-- Conteúdo dinâmico injetado por js/produto.js -->
      <div class="loading-skeleton">
        <p>A carregar produto…</p>
      </div>
    </div>
  </main>

  <!-- Modal carrinho reutilizado -->
  <div class="modal-overlay" id="modal-carrinho" onclick="fecharCarrinhoOverlay(event)">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-titulo">🛒 O teu carrinho</span>
        <button class="btn-fechar" onclick="fecharCarrinho()" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-lista" id="lista-carrinho"></div>
      <div class="modal-footer">
        <div class="modal-total">
          <span class="modal-total-label">Subtotal</span>
          <span class="modal-total-valor" id="total-carrinho">MZN 0,00</span>
        </div>
        <button class="btn-finalizar" onclick="location.href='../index.html#cotacao'">
          Finalizar com Cotação →
        </button>
        <button class="btn-whatsapp btn-whatsapp-lm" onclick="checkoutWhatsAppCarrinho()">
          Comprar via WhatsApp
        </button>
        <button class="btn-limpar" onclick="confirmarLimparCart()">Limpar carrinho</button>
      </div>
    </div>
  </div>

  <!-- Footer dinâmico -->
  <div data-component="footer"></div>

  <!-- Scripts (ordem importa: dados → cart → reviews → produto → componentes) -->
  <script src="../js/produtos.js"></script>
  <script src="../js/carrinho.js"></script>
  <script src="../js/shipping.js"></script>
  <script src="../js/pdf.js"></script>
  <script src="../js/reviews.js"></script>
  <script src="../js/produto.js"></script>
  <script src="../js/components.js"></script>

  <script>
    function fecharCarrinhoOverlay(e) {
      if (e.target === document.getElementById("modal-carrinho")) fecharCarrinho();
    }
    function confirmarLimparCart() {
      if (confirm("Remover todos os produtos do carrinho?")) {
        limparCarrinho();
        renderizarCarrinhoModal();
      }
    }
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") fecharCarrinho(); });
  </script>
</body>
</html>
